name: Build and upload to PyPI

on:
  push:
    # tags:
    #   - "*"

jobs:
  build_sdist:
    name: Build sdist
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true #not needed
      - name: Build SDist
        run: pipx run build --sdist
      - name: Check metadata
        run: pipx run twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: artifact-targz
          path: dist/*.tar.gz
      - name: Print a message
        run: echo "Il puzzaculo è stato qui"

  build_wheels:
    name: Build wheel ${{ matrix.python }}-${{ matrix.buildplat[1] }}-${{ matrix.buildplat[2] }}
    runs-on: ${{ matrix.buildplat[0] }}
    strategy:
      fail-fast: false
      matrix:
        python: ["cp38", "cp39", "cp310", "cp311", "cp312", "cp313", "cp314"]
        buildplat:
          - [ubuntu-22.04, manylinux_x86_64, ""]
          - [macos-15-intel, macosx_x86_64, openblas]
          - [macos-14, macosx_arm64, openblas]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true #not needed
      - uses: pypa/cibuildwheel@v3.4.0
        env:
          CIBW_BUILD: ${{ matrix.python }}-${{ matrix.buildplat[1] }}
          CIBW_BEFORE_ALL_LINUX: >
            yum -y install wget &&
            yum -y install tar &&
            wget https://mirror.ibcp.fr/pub/gnu/gsl/gsl-2.8.tar.gz &&
            tar -zxvf gsl-2.8.tar.gz &&
            cd gsl-2.8 &&
            ./configure &&
            make &&
            make install &&
            cd ..
          CIBW_BEFORE_ALL_MACOS: >
            brew reinstall gcc &&
            brew install gsl
      - name: Verify clean directory
        run: git diff --exit-code
        shell: bash
      - uses: actions/upload-artifact@v4
        with:
          name: artifact-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: wheelhouse/*.whl

